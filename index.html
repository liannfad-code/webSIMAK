<style>

        /* Emoji animation styles */
        @keyframes falling-emoji {
            0% {

            10% {

            }
            90% {

            }
            100% {

        .emoji-particle {

<script>
    // Emoji particle generator
    document.addEventListener('DOMContentLoaded', () => {
        // Check for prefers-reduced-motion
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (prefersReducedMotion) return;

        const emojis = ['📚', '🎓', '✏️', '💡', '🧪', '🎨'];
        const container = document.getElementById('emoji-bg-container');
        
        function createEmoji() {
            const emojiEl = document.createElement('div');
            emojiEl.classList.add('emoji-particle');
            emojiEl.innerText = emojis[Math.floor(Math.random() * emojis.length)];

            // Randomize properties
            const size = Math.random() * 24 + 16; // 16px to 40px
            const left = Math.random() * 100; // 0% to 100% viewport width
            const duration = Math.random() * 6 + 6; // 6s to 12s falling speed
            const delay = Math.random() * 2; // 0s to 2s delay
            
            // Apply randomized styles
            emojiEl.style.fontSize = `${size}px`;
            emojiEl.style.left = `${left}vw`;
            emojiEl.style.animationDuration = `${duration}s`;
            emojiEl.style.animationDelay = `${delay}s`;
            
            // Randomize rotation direction by flipping horizontally sometimes
            if (Math.random() > 0.5) {
                emojiEl.style.transform = 'scaleX(-1)';
            }

            container.appendChild(emojiEl);

            // Clean up element after animation finishes to prevent memory leaks
            setTimeout(() => {
                if (emojiEl.parentNode) {
                    emojiEl.remove();
                }
            }, (duration + delay) * 1000);
        }

        // Spawn initial batch
        for (let i = 0; i < 8; i++) {
            createEmoji();
        }

        // Continue spawning continuously
        setInterval(createEmoji, 800);
    });
</script>
<script>
// --- SOUND SYSTEM ---
const AudioContext = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
    if (!audioCtx) audioCtx = new AudioContext();
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
    if (!audioCtx) initAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.1);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
    }
}

// Global Click Listener for UI Sounds
document.addEventListener('click', (e) => {
    initAudio();
    const target = e.target.closest('button, a, label');
    if (target) {
        playSound('click');
    }
});
</script>
